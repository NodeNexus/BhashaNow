<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharatiya Lipi - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #84fab0, #8fd3f4);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
        }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-bg {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .action-card {
             background: rgba(255, 255, 255, 0.2);
             border: 1px solid rgba(255, 255, 255, 0.1);
             transition: transform 0.3s ease-out, box-shadow 0.3s ease-out, background 0.3s ease-out;
        }
        .action-card:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .logo-gradient {
            background: -webkit-linear-gradient(45deg, #f97316, #ea580c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-link {
            transition: background 0.2s, color 0.2s, padding-left 0.2s;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background-color: rgba(255,255,255,0.2);
            padding-left: 1.25rem;
        }
    </style>
</head>
<body class="min-h-screen">
    <canvas id="particle-canvas"></canvas>
    
    <div class="flex h-screen bg-transparent">
        <!-- Sidebar -->
        <aside class="w-64 flex-shrink-0 p-4 hidden md:flex flex-col">
            <div class="flex-grow glass-bg rounded-2xl flex flex-col p-4">
                <a href="hub.html" class="flex items-center space-x-2 px-2 pb-4 border-b border-white/20">
                    <span class="text-3xl font-bold logo-gradient">अ</span>
                    <span class="text-xl font-bold text-gray-800">Bharatiya Lipi</span>
                </a>
                <nav class="mt-8 space-y-2">
                    <a href="hub.html" class="sidebar-link active flex items-center gap-3 py-2 px-4 rounded-lg text-gray-800 font-semibold">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        Dashboard
                    </a>
                    <a href="signup.html" class="sidebar-link flex items-center gap-3 py-2 px-4 rounded-lg text-gray-800 font-semibold">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Profile
                    </a>
                </nav>
                <div class="mt-auto">
                    <a href="index.html" class="sidebar-link flex items-center gap-3 py-2 px-4 rounded-lg text-gray-800 font-semibold">

        <!-- Main Content -->
        <main class="flex-1 p-4 flex flex-col">
            <div class="flex-grow glass-bg rounded-2xl p-6 md:p-8 flex flex-col">
                <!-- Header -->
                <header class="flex-shrink-0">
                    <div class="flex justify-between items-center">

                            <h1 id="welcome-header" class="text-3xl font-bold text-gray-800">Welcome, Ananya!</h1>

                <!-- Quick Actions -->
                <section class="mt-8">
                    <h2 class="text-2xl font-semibold text-gray-800">Quick Actions</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                        <a href="camera.html" class="action-card rounded-xl p-6 flex items-center gap-4">
                            <div class="bg-orange-100 p-3 rounded-full"><svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
                            <div>
                                <h3 class="font-bold text-lg text-gray-800">Use Camera</h3>
                                <p class="text-sm text-gray-700">Transliterate from an image.</p>
                            </div>
                        </a>
                        <a href="text-transliteration.html" class="action-card rounded-xl p-6 flex items-center gap-4">
                            <div class="bg-blue-100 p-3 rounded-full"><svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></div>
                             <div>
                                <h3 class="font-bold text-lg text-gray-800">Enter Text</h3>
                                <p class="text-sm text-gray-700">Type or paste text to transliterate.</p>
                            </div>
                        </a>
                    </div>
                </section>
                
      <!-- Map Section -->
<section class="mt-8 flex-grow flex flex-col">
    <h2 class="text-2xl font-semibold text-gray-800">Current Location</h2>
    <div class="mt-2 flex gap-2 items-center">
        <p id="location" class="text-gray-700"></p>
        <button onclick="getLocation()" class="bg-orange-500 text-white px-3 py-1 rounded-lg hover:bg-orange-600">Get Coordinates</button>
    </div>
    <div id="map" class="mt-4 flex-grow rounded-xl overflow-hidden relative border border-white/20"></div>
</section>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Default map (in case location not allowed)
    var map = L.map('map').setView([21.1458, 79.0882], 5);

    // Add OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a>'
    }).addTo(map);

    var marker; // store the marker globally so we can update it

    // Function to fetch coordinates and update map
    window.getLocation = function() {
        var X = document.getElementById('location');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    X.innerHTML = `Latitude: ${lat} | Longitude: ${lon} | Accuracy: ${accuracy} meters`;

                    // Update map
                    map.setView([lat, lon], 13);

                    // Remove old marker if exists
                    if (marker) map.removeLayer(marker);

                    // Add new marker
                    marker = L.marker([lat, lon]).addTo(map)
                        .bindPopup("You are here 📍")
                        .openPopup();
                },
                function(error) {
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            X.innerHTML = "User denied the request for Geolocation.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            X.innerHTML = "Location information is unavailable.";
                            break;
                        case error.TIMEOUT:
                            X.innerHTML = "The request to get user location timed out.";
                            break;
                        default:
                            X.innerHTML = "An unknown error occurred.";
                            break;
                    }
                    console.error(error);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } // High accuracy enabled
            );
        } else {
            X.innerHTML = "Geolocation is not supported by your browser.";
        }
    };

    // Automatically fetch location on page load
    if (navigator.geolocation) getLocation();
});
</script>



</body>
</html>
